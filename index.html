<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SiSUPER - Sistem Surat Tugas & Perjalanan Dinas</title>
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/a/a0/Lambang_Kabupaten_Aceh_Timur.png" />
  <style>
 /* --- STYLES FOR LOADING SCREEN --- */
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #121212; /* Warna latar belakang loading */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Memastikan loading berada di paling atas */
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        /* Animasi Spinner Putar */
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #3498db; /* Warna aksen loading */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Teks Loading */
        .loading-text {
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: 15px;
            font-size: 18px;
            letter-spacing: 1px;
        }

        /* Efek Hilang (Fade Out) */
        .loading-hidden {
            opacity: 0;
            visibility: hidden;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- STYLES UNTUK KONTEN UTAMA --- */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #f4f4f4;
        }
        .content {
            padding: 40px;
            text-align: center;
        }   



   html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #eee;
      overflow: hidden; /* Mencegah scroll ganda */
    }

    .iframe-container {
      width: 100%;
      height: 100dvh; /* Menggunakan dvh agar pas di mobile browser */
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
<!-- LAYER LOADING SCREEN -->
    <div class="loading-container" id="loadingScreen">
        <div class="spinner"></div>
        <div class="loading-text">Memuat halaman...</div>
    </div>

  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbz87aaVgAoKOVFPeg8NgyaHdwpUMHop5y7cj2TLhK1ISxVORpITY3b5CdQ7mMx2nOLooA/exec"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>
  
  
  <!-- SCRIPT JAVASCRIPT -->
    <script>
        // Menunggu sampai seluruh halaman (gambar, stylesheet, dll.) selesai dimuat
        window.addEventListener("load", function () {
            const loader = document.getElementById("loadingScreen");
            
            // Menambahkan class untuk efek fade-out
            loader.classList.add("loading-hidden");
        });
    </script>
  
</body>
</html>
